version: 1

skills:
  include:
    - "SKILL.md"
  defaults:
    # vibe-validate orchestrates `vv` CLI invocations and shell-based
    # validation pipelines — local shell is required.
    targets: ['claude-code']

claude:
  marketplaces:
    vibe-validate:
      owner:
        name: vibe-validate
      publish:
        branch: claude-marketplace
        changelog: ../../CHANGELOG.md
        readme: ../../docs/marketplace-readme.md
        license: mit
      plugins:
        - name: vibe-validate
          description: LLM-optimized validation orchestration for vibe coding
          skills: "*"
